<body>

    <div class="wrapper">
        <header>
        <nav>
            <ul>
                <li><a href="/index.html">Startsida</a></li>
                <li class="active"><a href="/add.html">Lägg till jobb</a></li>
                <li><a href="/about.html">Om sidan</a></li>
            </ul>
        </nav>
            <h1>Mitt digitala CV</h1>
        </header>
        <main>

            <h2>Lägg till arbetslivserfarenhet</h2>
           
            <form id="add-workexperience">
                <label>
                    Företagsnamn:<br>
                    <input type="text" id="company-name">
                </label>

                <label>
                    Roll:<br>
                    <input type="text" id="job-title">
                </label>

                <label>
                    Ort:<br>
                    <input type="text" id="job-location">
                </label>

                <label>
                    Började:<br>
                    <input type="date" id="start-date">
                </label>

                <label>
                    Slutade:<br>
                    <input type="date" id="end-date">
                </label>

                <label class="desc">
                    Beskrivning:<br>
                    <textarea id="job-description"></textarea>
                </label>

                <button type="submit">Lägg till erfarenhet</button>

                <div id="message">
                </div>

            </form>


        </main>
    </div>
   
</body>
